feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  sentinel:
    enabled: true
  hystrix:
    enabled: false
  compression:
    request:
      enabled: true
    response:
      enabled: true
  okhttp:
    enabled: true


ribbon:
  ReadTimeout: 5000
  ConnectTimeout: 2000
  MaxAutoRetries: 1
  OkToRetryOnAllOperations: true
  MaxAutoRetriesNextServer: 1
  http:
    client:
      enabled: false
  okhttp:
    enabled: true
  eager-load:
    enabled: true
  nacos:
    enabled: true

spring:
  mvc:
    throw-exception-if-no-handler-found: true
  resources:
    add-mappings: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    deserialization:
      read-unknown-enum-values-as-null: true
      accept-empty-string-as-null-object: true
    time-zone: GMT+8
  security:
    oauth2:
      resource-server:
        jwt:
          jwk-set-uri: http://daas-svc-auth/oauth2/jwks

management:
  endpoint:
    health:
      probes:
        enabled: true
    shutdown:
      enabled: true

springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: healthcaredaas.hscp
  default-flat-param-object: true